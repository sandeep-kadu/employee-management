<div class="container mt-5">

  <div class="card p-4">

    <h2>Login</h2>

    <input
      class="form-control mb-3"
      type="text"
      placeholder="Username"
      [(ngModel)]="username">

    <input
      class="form-control mb-3"
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button
      class="btn btn-primary"
      (click)="login()">
      Login
    </button>


    <h3>Welcome {{username}}!</h3>
  </div>

</div>
